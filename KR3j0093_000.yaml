body:
  text: 仇池筆記雜家類三雜説之屬提要臣等謹案仇池筆記二卷舊本題宋蘇軾撰疑好事者集其襍帖為之未必出軾之手著觀下卷杜甫詩一條云杜甫詩固無敵然自致逺已下句甚村陋也其為偶閲杜詩批于致逺終恐泥句上之語顯然無疑他可以類推矣又如蒸豚詩一條記醉僧事不類軾語疑併有所附㑹竄入然相傳引用已久亦間可以備考証也此書陶宗儀説郛亦収之而刪節不完明萬厯壬寅趙開美嘗刋其全本板已久佚此本前有開美序盖從趙本錄出者書中與志林互見者皆但存標題而下注見志林字疑亦開美所改竄云乾隆四十二年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀仇池筆記原序筆記於志林表裏書也先大夫既已序志林而刻之矣兹於曽公類説中復得此兩卷其與志林並見者得三十六則去其文而存其題庶無複辭亦不廢若原書此余刻筆記意也竊謂長公才具七斗游戲翰墨皆成文章故片紙隻字無非斷圭折璧才既髙而節復峻此足以起忮矣况復呶呶不勝其䀝睨一世則側目而揶揄之者固將甘心焉而相公厮壊殆以柄國者為鱉矣士固可殺不可辱也議新法未必傷柄人之心然此等語不足以徹髓耶夫荆公固士也學雖僻而奈何辱之哉烏臺之獄豈盡人尢也乎刻筆記萬厯壬寅孟夏日海虞清常道人趙開美識

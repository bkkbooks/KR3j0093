body:
  text: 仇池筆記卷上宋蘇軾撰論文選舟中讀文選恨其編次無法去取失當齊梁文字衰陋蕭統尤為卑弱如李陵五言皆僞今日觀瀾集可喜者甚多而獨取數篇淵明作閒情賦正所謂國風好色而不淫正使不及周南與屈原所陳何異而統大譏之此小兒强作解事也三殤李善注文選本末詳備所謂五臣者真俚儒荒陋者也謝張子房詩云苛慝暴三殤此禮所謂上中下三殤言秦無道戮及幼稚而注乃謂苛政猛於虎吾父吾夫吾子皆死謂夫謂父為殤此類甚多日月蝕玉川子月蝕詩以蝕者月中蝦蟇也梅聖俞作日蝕詩云食日者三足烏也此因俚說以寓意也戰國䇿日月輝於外其賊在內則俚說亦當矣中宫太乙杜子美詩云自平中宫吕太乙世不曉其義而妄者以為唐有平中宫偶讀𤣥宗實録有中宫太乙判於廣南杜詩云自平中宫吕太乙下文又有南海取珠之句見書不廣輕改文字鮮不為笑八陳圖詩子嘗夢杜子美云世人誤㑹八陳圖詩云江流石不轉遺恨失吞吳以為先主武侯欲與關羽復仇故恨不滅吳非也我意本為吳蜀唇齒之國不當相圖晉能取蜀者以蜀有吞吳之意此為恨耳不忮之誠信於異類豫少時書室前竹柏雜花衆鳥巢於上武陽君惡殺生婢僕不得捕取數年間鳥有巢於低枝其鷇可俯而窺也此無它不忮之誠信於異類陽關三疊舊傳陽關三疊今歌者每句再疊而已若通一首又是四疊皆非是每句三唱以應三疊則叢然無復節奏有文勛者得古本陽關每句皆再唱而第一句不疊乃知唐本三疊如此樂天詩云相逢且莫推辭醉聽唱陽關第四聲勸君更盡一杯酒以此驗之若一句再疊則此句為第五聲今為第四則一句不疊審矣磨蝎為身宫見志林一卷治齒治目見志林一卷老子解子由寄老子新解使戰國時有此書則無商鞅韓非使漢初有此書則孔老為一晉宋間有此書則佛老不為二三豪詩石介作三豪詩云曼卿豪於詩永叔豪於詞師雄豪於歌永叔亦贈杜默師雄詩云贈之三豪篇而我濫一名默歌少見於世有云學海波中老龍夫子門前大蟲皆此類語永叔不誚者此公惡爭名且為介諱也默豪氣正是京東學究飲私酒食瘴死牛肉醉飽後所發也作詩狂怪至盧同馬異極矣若更求奇便作杜默矣萬花㑹揚州芍藥為天下冠蔡京為守始作萬花㑹用花十餘萬枝既困諸邑吏緣為姦豫首罷之萬花本洛帥故事亦為民害錢惟演作留守始置驛貢洛花有識鄙之此宫妾愛君之意也弄胡孫見志林四卷治大風方見志林三卷酒名退之詩云且可勤買拋青春國史補云酒有郢之富水春烏程之若下春滎陽之土窟春富平之石凍春劍南之燒春杜子美詩云聞道雲安麯米春裴鉶傳奇亦有酒名松醪春乃知唐人名酒多以春論詩唐末五代人物衰盡詩有貫休書有亞栖村俗之氣大率相似蘇子美家有長史書云隔簾歌已俊對坐貌彌精語既凡惡而字法真亞栖之流曽子固編李太白集而有贈僧懷素草書歌及笑巳乎數首皆貫休以下格調卑陋子固號有知識者故深可怪如白樂天贈徐凝退之贈賈島皆世俗無知者所記不足多怪禁同省往來見志林二卷劉原父語見志林一卷溪洞畫李中師像郭祥正嘗從章惇入梅山溪洞中見洞主蘇甘家有畫像事之甚謹云桂府李大夫也問其名曰此豈可名哉叩頭稱死罪數四卒不敢名徐考其年月則李中師誠之也嘗為提刑權桂府耳夷獠乃爾畏信之韓玉汝李金吾韓縝為秦州以賊殺不辜去官秦人語曰寧逢乳虎莫逢韓玉汝孫臨最滑稽或問莫逢韓玉汝當以何對臨曰可怕李金吾舒公封荆公王介甫先封舒公改封荆公詩曰戎狄是膺荆舒是懲識者曰宰相不學之過也以意改書近世人輕以意改書鄙賤之人好惡多同從而和之遂使古書日就舛訛孔子曰吾猶及史之闕文也蜀本莊子云用志不分乃疑於神此與易隂疑於陽禮使人疑女於夫子同今四方本皆作凝陶濳詩採菊東籬下悠然見南山採菊之次偶見南山境與意㑹今皆作望南山杜子美云白鷗沒浩蕩蓋滅沒於煙波間而宋敏求云鷗不解沒改作波二詩改此兩字覺一篇神氣索然也書秋雨詩把人馬正卿作太學生有氣節學生不喜博士亦忌之豫偶至齊書杜子美秋雨歎一篇壁上初無意也正卿即日辭歸不出至今白首固窮守節杜子美詩余在岐山見秦州進一馬鬃如斗項下重胡倒立毛生肉端蕃人云此肉鬃乃知鄧公驄馬行肉駿碨礧連錢動當作肉騣悲陳陶云四方義士同日死此房琯之敗也唐書作陳濤未知孰是琯既敗猶欲持重有所伺而中人促戰遂大敗故後篇云焉得附書與我軍忍待明年莫倉卒北征詩云桓桓陳將軍仗鉞奮忠烈謂陳元禮也佐𤣥宗平內難又從幸蜀建誅國忠之䇿洗兵馬云張公一生江海客此張鎬也明皇雖誅蕭至忠常懷之侯君集云蹭蹬至此至忠亦蹭蹬者耶故杜子美亦哀之云赫赫蕭京兆今為時所憐後出塞詩云我本良家子出師亦多門躍馬三十年恐負明主恩見坐幽州騎長驅河洛昏中夜間道歸故里但荒村惡名幸脫免窮老無兒孫詳味此詩蓋祿山反時其將有脫身歸國而祿山殺其妻兒者不出姓名可恨也憶昔詩云關中小兒壞紀綱謂李輔國也張后不樂上為忙謂肅宗張皇后也為留猛士守未央謂郭子儀奪兵柄入宿衛也子美詩外有事在杜子美自許稷與契未必許也然其詩云舜舉十六相身尊道何髙秦時用商鞅法令如牛毛此是稷契輩人口中語也又云知名未足稱局促商山翁又云王侯與螻蟻同盡隨丘墟願聞第一義回向心地初乃知子美詩外尚有事在也歸去來詞見志林三卷孟郊詩見志林三卷二條並見論貧士則中白樂天詩白樂天為王涯所讒謫江州司馬甘露之禍樂天有詩云當君白首同歸日是我青山獨往時不知者以為幸亡樂天豈幸人之禍者哉蓋悲之也成相孫卿子書有韻語者其言鄙近多云成相莫曉其義前漢藝文志詩賦類中有成相雜詞十一篇則成相古謳謠之名也疑所謂喪舂不相者又樂記云治亂以相亦恐由此得名擬作劉子𤣥辨文選所載李陵與蘇武書並齊梁文士擬作豫因悟陵與武五言亦後人擬作列女傳蔡琰二詩其詞明白感慨頗類木蘭詩東京無此格也建安七子猶含蓄不盡發見况伯喈女乎琰之流離必在父歿之後董卓既誅伯喈乃遇禍此詩乃云董卓所驅虜入胡尤知其非真也蓋范曄荒淺遂載之本傳食薑損智王介甫多思而言鑿時出一新說已而悟其非又出一說以解之是以其學多說嘗與劉貢父食曰孔子不撤薑食何也貢父曰本草言薑食多損智道非明民將以愚之孔子以道教人者故不撤薑食所以愚之也介甫欣然而笑久之乃悟其戲也貢父雖戲言王氏之學實大類此石墨陸士衡與士龍書云登銅雀臺得曹公所藏石墨數甕今分寄一螺大業拾遺宫中以蛾緑畫眉亦石墨之類也沈存中帥鄜延以石燭作墨堅重而墨在松烟之上曹公所藏豈此物也桃笙柳子厚詩云盛時一失貴反賤桃笙葵扇安可常不知桃笙為何物因閲方言宋魏之間簟謂之笙乃悟桃笙以桃竹為簟也池魚見志林三卷耳白於靣見志林三卷如夢詞泗州雍熙塔下余戲作如夢令兩闋云水垢何曾相受細看兩俱無有寄語揩背人盡日勞君揮肘輕手輕手居士本來無垢又云自淨方能洗彼我自汗流呀氣寄語澡浴人且共肉身游戲但洗但洗本為人間一切唐莊宗製名憶先婆嫌其不雅馴改為如夢莊宗詞云如夢如夢和淚出門相送取以為名云論物理舒州醫人李惟熙善論物理云菱芡皆水物菱寒而芡暖者菱花開背日芡花開向日故也又曰桃杏雙仁輒殺人者其花本五出六出必雙仁草木花皆五出惟雪花六出此殆隂陽之理今桃杏六出雙仁皆殺人者失常故也木螙木實之螙者必不沙爛爛者必不螙而能浮不浮者亦殺人常考其理既沙爛散則不能藴蓄而生蟲瓜至甘而不螙者以其沙也小兒吸蟾蜍氣見志林三卷奴為􅑂見志林三卷附語見志林二卷晉人書唐太宗購晉人書有二王以下富千軸皆在祕府武后時為張易之兄弟所攘竊遂流落人間多在王涯張延賞家涯敗軍人劫奪金玉軸而棄其書余於李瑋都尉家見晉人數帖皆有小印涯字意其為王氏物也有謝尚謝鯤王衍等字皆竒夷甫獨超然若羣鶴聳翅欲飛而未起也𨼆者楊朴見志林二卷古鏡元豐中余自齊安過古黃州獲一鏡其背銘云漢有善銅出白陽取為鏡清而明左龍右虎輔之其字如菽大篆欵甚精妙白陽疑白水之陽也其銅黑色如漆照人微小古鏡皆然此道家聚形之法也剖桃核得雄黃見志林三卷砑光帽徐倅李陶有子年十七八忽詠落花詩云流水難窮目斜陽易斷腸誰同砑光帽一曲舞山香父驚問之若有物馮附者云西王母宴羣仙有舞者戴砑光帽帽上簪花舞山香一曲曲未終花皆落去戴嵩鬬牛有藏戴嵩鬬牛者以錦囊繫肘後隨出與客觀旁有牧童曰鬬牛力在前尾入兩股間今畫鬬而尾掉何也黃荃畫飛鴈頭足皆展或曰飛鳥縮頭則展足縮足則展頭無兩展者驗之信然鵝有二能錢塘人喜殺日屠百鵝有人自湖上夜歸屠者之門百鵝皆號聲振衢路若有所訴鵝能驚盜亦能却蛇其糞殺蛇蜀人園池養鵝蛇即逺去所有二能而不能免死人有技倆之厄也悲夫安得人如逸少乎戒殺水族癡暗人輕殺之或云不能償寃是乃欺善怕惡李公擢云雞有雌而卵者抱之雖能破殼而出不數日輒死此卵可食非殺也豫曰凡能動者皆佛子也竹蝨初如塗粉竹葉上久乃能動百千為曹無非佛子梁武水陸畫像六道外者以淡墨作人畜禽魚等形罔罔然於空中乃是佛子流浪陋劣之極至於濕生如竹蝨者猶不可得但若存若亡於冥間耳而謂水族雞卵可殺乎但一起殺念地獄已具不必在其能訴與不能訴也論醫醫之難明古今所病也至虛有盛候而大實有羸狀疑似之間便有死生之異士大夫多祕所患以求痊驗醫能否使索病於冥漠之中辨虛實冷暖於疑似之際醫不幸而失終不肯自謂失也巧飾遂非以全其名間有謹願者雖或主人言之亦參以所見兩存而雜治吾平生求醫蓋於平時默驗其工拙有疾求療必盡告以所患使醫了然知患之所在然後診之虛實冷暖先定於中脈之疑似不能惑也故雖中醫治吾疾嘗愈吾求疾愈而已豈以困醫為事哉黎稼子見志林一卷服井花水見志林一卷費孝先卦影見志林三卷看茶啜墨真松煤逺烟自有龍麝氣世之嗜者如滕達道蘇浩然吕行甫暇日晴暖研墨水數合弄筆之餘乃啜飲之蔡君謨嗜茶老病不能飲但把玩而已看茶啜墨亦事之可笑者也正獻公焚聖語杜正獻公為相蔡君謨孫之翰為諫官屢乞出仁宗曰卿等審欲得郡當具所欲奏來於是蔡除福州孫除安州正獻公曰諫官無故出終非美事乞且依舊上可之退書聖語時陳恭公為執政不肯書曰吾初不聞正獻懼遂焚之由此罷相議者謂正獻當明日奏審不當遽焚其書也賈婆婆見志林三卷世有顯人李士衡之父豪恣不法誅死士衡進用王欽若欲言之而未有路㑹真宗論時文之敝因言路振文人也然不識體上曰何也曰李士衡父誅死而振為贈誥曰世有顯人上頷之士衡以故不大用論柳宗元見志林四卷論金土同價齊髙帝曰當使金土同價意則善矣然物豈有此理哉孟子曰物之不齊物之情也巨屨小屨同價人豈為之哉孟子亦自忘此言為菽粟如水火之論金不可賤如土猶土不可貴如金也堯之民比屋可封桀之民比屋可誅若信此說則堯時諸侯滿天下桀時大辟遍四海也青苖錢見志林二卷巫蠱漢武帝惡巫蠱如仇讐蓋夫婦君臣父子之間嗷嗷然不聊生矣然史記封禪書云丁夫人洛陽虞初等以方祠詛胸奴大宛已且為巫蠱何以責臣下此最可笑字謎鮑明逺詩有字謎三首飛泉仰流者舊說是井字又乾之一九隻立無偶坤之六二宛然雙宿云是桑字又頭如刀尾如鈎中間橫四角六抽右面負兩刃左邊雙屬牛乃龜字也論墨今世論墨惟取其光而不黑是為棄墨黑而不光索然無神氣亦復安用要使其光清而不渾一作浮湛湛然如小兒目睛乃佳佛菩薩語濟南監鎮宋保國出其所集王荆公華嚴解余曰華嚴有八十一卷今獨解其一何也曰公謂我此佛語至深妙他皆菩薩語耳曰豫於藏經中取佛語數句雜菩薩語中復取菩薩語數句雜佛語中子能識其是非乎曰不能也曰非獨子不能荆公亦不能也豫昔在岐下聞河陽猪肉美使人往致之使者醉猪夜逸買他猪以償吾不知也客皆大詫以為非他産所及已而事敗客皆大慙今荆公之猪未敗耳屠者賣肉倡者唱歌或因以悟子若一念清淨墻壁瓦礫皆說無上法而云佛語深妙菩薩語不及豈非夢中語乎保國曰唯李赤詩姑熟堂下詠怪其語不類太白王平甫云此李赤詩也赤自比李白故名赤後為厠鬼所惑死今觀其詩止於此以太白自比其心疾久矣豈厠鬼之罪耶論茶除煩去膩不可缺茶然暗中損人不少吾有一法每食畢以濃茶潄口煩膩既出而脾胃不知肉在齒間消縮脫去不煩挑刺而齒性便若緣此堅密率皆用中下茶其上者亦不常有數日一啜不為害也此大有理魯直詩文黃魯直詩文如蝤蛑江瑤柱格韻髙絶盤餐盡廢然不可多食多食則發風動氣論漆漆畏蟹豫嘗使工作漆器工以蒸餅潔手而食之宛轉如中毒狀急以蟹黃食之乃蘇墨入漆最善然以少蟹黃敗之乃可不爾即堅頑不可用也二紅飯今年東坡收大麥二十餘石賣之價甚賤而粳米適盡故日夜課奴婢以為飯嚼之嘖嘖有聲小兒女相調云是嚼虱子然日中腹飢用漿水淘食之自然甘酸浮滑有西北村落氣味今日復令庖人雜小豆作飯尤有味老妻大笑曰此新樣二紅飯也大禹周公東坡將别乞一言於徐仲車曰自古皆有功獨稱大禹之功自古皆有才獨稱周公之才以其有德以將之故耳仇池筆記卷上

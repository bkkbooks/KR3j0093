  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0093_WYG_002-1a, image: WYG0863/WYG0863-0013a.png}
body:
  text: 仇池筆記卷下宋蘇軾撰論設醴楚元王為穆生設醴王戊即位亡設穆生遂謝病去申公白公留戊稍淫暴二人諫不聽赭衣襍舂於市申公愧之歸魯而趙綰王臧言於武帝以蒲輪召卒坐綰臧事病免穆生逺引於未然之前申公睠戀於既然之後謂禍福皆天不可避絶者未必然也服松脂松脂以鎮定者為良細布袋盛漬水中沸湯煮之浮水面者罩籬掠取投新水中乆煮不出棄不用入白茯苓末杵羅為末每日取三錢匕着口中用少熟水潄仍如常法揩齒更啜少熟水嚥之仍潄齒牢牙駐顔烏鬚也孔北海王鞏云張安道説蘇子瞻比予孔北海諸葛孔明孔明吾豈敢望北海或似之然不至若是之惷也北海以忠義氣節冠天下其勢足與曹操相軒輊决非兩立者北海以一死捍漢豈所謂輕於鴻毛者何名為惷哉梁賈見志林三卷雞唱光黄人二三月羣聚謳歌不中音律宛轉如雞鳴耳與宫人唱漏微相似但極鄙野漢官儀宫中不畜雞汝南出長鳴雞衛士候於朱雀門外専傳雞唱又應劭曰令雞鳴歌晉太康地道記曰後漢衛士習此曲於關下歌之今雞唱是也顔師古不考古本妄破此説今余所聞豈雞唱之遺音乎今士人謂之山歌云王晉卿墨王晉卿造墨用黄金丹砂墨成價與金等三衢蔡瑫自烟煤膠外一物不用特以和劑有法甚黑而光殆不減晉卿胡人謂犀黑暗象白暗可以名墨亦可以名茶徐仲車二反徐積字仲車古之獨行於陵仲子不能過然其詩文則怪而放如玉川子此一反也耳瞶畫地為字乃始通終日面壁坐不與人接而四方事無不知此二反也論漢武帝見志林四卷硬黄臨二王書王㑹稽父子書存於世者蓋一二數唐人禇薛之流硬黄臨倣亦足為貴魯直詩讀魯直詩如見魯仲連李太白不敢復論鄙事雖若不入用不無補於世也寳應民見志林二卷佛受戒平寃李如損之妹既笄發病見前世寃對日月笞之遂歸誠佛法夢中見佛與受戒平遣寃者李因蔬食不嫁君謨書僕嘗論蔡君謨書為本朝第一議者多以為不然或謂君謨書為弱殊非知書者若江南李主外險而中實無有此真可謂弱者以李主為勁則宜以君謨為弱張子野詩張子野詩筆老妙歌詞乃餘波耳華州西溪云浮萍破處見山影野艇歸一作横來聞棹聲和愁詩云愁似鰥魚知夜永懶同蝴蝶為春忙若此之類皆可追配古人而世俗但稱其歌詞晉周昉畫人物入神世亦但知有周昉士女可謂未見好徳如好色者歟林檎詩兒子邁幼作林檎詩云熟顆無風時自落半腮迎日鬬鮮紅於等輩號有思致者又詩云葉隨流水歸何處牛帶寒鴉過晚村此亦可人鳳咮研僕好用鳳咮石研論者多異同蓋少得真者黯然灘石亂之耳李十八草書劉十五論李十八草書謂之鸚哥嬌意謂鸚鵡能言不過數句大率雜以鳥語十八後稍進以書問僕近日比舊何如僕答曰可作秦吉了矣楊凝式書唐末五代文章卑泥字畫從之而楊凝式筆跡雄强徃徃與顔柳相上下今世多稱李建中宋宣獻此二人書僕所不解宋寒而李俗殆是浪得名耳惟蔡君謨書姿格既髙而學亦至當為本朝第一杜甫詩杜甫詩固無敵然自致逺已下句甚村陋也世人雷同不復譏評過矣然亦不能掩其美也與曇秀倡和余在廣陵送客山光寺曇秀作詩云扁舟乘興到山光古寺臨流勝氣藏慚愧南風知我意吹將草木作天香予和云閙裏清游借隙光醉時真境發天藏夢回拾得吹來句十里南風草木香文與可詩余昔對歐公誦文與可詩云美人却扇坐羞落庭下花公曰世間元有此句與可拾得耳論董秦玉川子月蝕詩云歳星主福禄官爵奉董秦詳味此語當是無功而享厚禄者秦本忠臣天寳末屢立戰功亦頗知義代宗時吐蕃犯闕徵兵秦即日赴難或勸擇日答曰君父在難乃擇日耶後汙朱泚偽命誅考其終始非無功而享禄者不知玉川子何以有此句樂天燒丹見志林一卷盤逰飯谷董羮江南人好作盤逰飯鮓脯鱠炙無不有埋在飯中里諺曰掘得窖子羅浮頴老取凡飲食雜烹之名谷董羮詩人陸道士出一聨云投醪谷董羮鍋内掘窖盤逰飯盌中參寥詩見志林一卷煮猪頭頌浄洗鍋淺着水深壓柴頭莫教起黄豕賤如土富者不肯吃貧者不解煮有時自家打一碗自飽自知君莫管􅣪草詩杜子美有除􅣪草一篇蜀中謂之毛􅣪毛芒可畏觸之如蜂蠆治風疹以此草㸃之一身失去葉背紫者入藥杜詩注云􅣪音灊山篚也採艾端午日日未出時以意求艾似人者採之以炙殊效一書中見之忘其為何書也艾未有真似人者於明暗間以意命之而已萬法皆妄無一真者此何疑也治内障眼本草云熟地黄麥門冬車前子相雜治内障眼有効屢試信然其法細搗羅蜜丸如桐子大三藥皆難搗羅和合異常甘香真奇藥也露蜂房蛇退皮亂髮各燒灰存性取錢匕酒服治瘡乆不合潘谷墨潘谷墨既精妙而價不二一日忽取欠墨錢劵焚之飲酒三日發狂赴井死人下視之趺坐井中尚持數珠也雪堂義尊元祐中駙馬都尉王詵晉卿置墨數十品雜研之作數十字以觀色之淺深若果佳當搗為一品昔在黄州鄰近四五州送酒合置一器謂之雪堂義尊今又為雪堂義墨耶顔魯公論逸少字顔真卿寫碑唯東方朔畫贊最為清雄後見逸少本乃知魯公字臨此雖大小相懸而意良是非自得於書未易為言之也歐公書歐公用尖筆作方濶字神采秀發膏潤無窮後人見之如見其清晬豐頰進趨裕如也荆公書王荆公書得無法之法然不可學學之則無法僕書作意為之頗似蔡君謨稍得意則似楊風子更放則似言法華真人之心道家云心不離田手不離宅又云真人之心若珠在淵衆人之心若瓢在水搬運法揚州有武官侍其者官於二廣十餘年終不染瘴面紅膩腰足輕快初不服藥每日五更起坐兩足相向熱摩湧泉穴無數以汗出為度歐公平日不信仙佛笑人行氣晚年云數年來足瘡一㸃痛不可忍近有人傳一法用之三日不覺失去其法重足坐閉目握固縮谷道搖颭兩足如氣毬狀氣極則休氣平復為之日八九度得暇即為乃搬運捷法也文忠痛已即廢若不廢當有益勤脩善果佛云三千大千世界猶如空華亂起亂滅而况我在空華起滅之中寄此須臾貴賤夀夭得失賢愚所訃幾何惟有勤脩善果以升神明照遣虛妄以誠知本性最為着身要事也衆狗不悦惠州市寥落然每日殺一羊不敢與在官者爭買時囑屠者買其脊骨間亦有微肉熟煮熟漉若不熟則泡水不除隨意用酒薄㸃鹽炙微焦食之終日摘剔得微肉於牙綮間如食蠏螯率三五日一食甚覺有補子由三年堂庖所食芻豢滅齒而不得骨豈復知此味乎此雖戲語極可施用用此法則衆狗不悦矣三老人問年見志林二卷夢韓魏公夜夢登合江樓月色如水韓魏公跨鶴來曰被命同領劇曹故來相報他日北歸中原當不乆也真一酒余在白鶴新居鄧道士忽叩門時已三鼔家人盡寢月色如霜其後有偉人衣桄榔葉手擕斗酒丰神映發如吕洞賓曰子嘗真一酒乎就坐三人各飲數杯擊節髙歌合江樓下海風振水大魚皆出袖出一書授予乃真一法及脩養九事其末云九霞仙人李靖書既去恍然法報化三身見志林二卷蒸豚詩王中令既平蜀飢甚入一村寺主僧醉甚箕踞公欲斬之僧應對不懼公奇之公求蔬食云有肉無蔬饋蒸猪頭甚美公喜問止能飯酒肉耶尚有他技也僧云能詩公令賦蒸豚立成云觜長毛短淺含一作金臕乆向山中食藥苖蒸處已將蕉葉裹熟時兼用杏漿澆紅鮮雅稱金盤飣熟軟真堪玉筯挑若把氊根來比並氊根自合喫藤條公大喜與紫衣師號儋耳地獄見志林二卷五穀耗地氣吾昔有田在蘄水僅種一斗得稻十斛問其故云連山皆野草散木不生五榖地氣不耗故發如此以是知五榖耗地氣為最甚王莽末天下旱蝗黄金一觔易粟一斗至漢光武六年野蚕成繭被於山澤至五年漸少而農事益脩蓋土不生榖地氣無所耗藴蓄日乆發而為野蚕旅榖其理甚明凡地不生草木者多産金錫亦其理也書此以為衛生之方論菊菊中黄之色香味和正花葉根實皆長生藥也北方隨秋早晚大略至菊有黄華乃開嶺南至冬乃盛地煖百卉造化無時而菊獨後開考其理菊性介烈不與百卉並盛衰須霜降乃發嶺南嘗以冬至微霜也仙卉髙潔如此宜其通仙靈也本秀二僧見志林二卷梅詢非君子見志林四卷吳育不相見志林四卷并上條見真宗仁宗之信任内時無英雄豎子成名見志林一卷永樂之役張舜民云永樂之役李舜舉徐禧李稷皆在圍中上以手詔賜四人云若能保全吏士當盡復侵地詔未至而舜舉等已死聖意可謂重一士而輕千里惜此等不被其賜也哀哉二李優劣中官李舜舉死於永樂將死以故紙半幅書曰臣舜舉死無所恨但願陛下勿輕此賊使一健黠者間走以聞時李稷亦將死書紙尾曰臣稷千苦萬屈上為一慟然二人優劣賢不肖已可見矣太尉足香方李憲用事士大夫或奴事之穆衍孫路至為執袍帶王中正盛時余充令妻執板以侑酒彭孫本一劫盜招出氣陵公卿韓持國至詣其第出妓飲酒酣慢持國持國不敢對然嘗為李憲濯足曰太尉足何香也憲以足踏其頭曰奴諂不太甚乎孫在許下私捉逃軍三百人役之予時將乞許至郡斬訖乃奏㑹除穎乃止西征途中詩張舜民通練西事稍能詩從髙遵裕西征回途中作詩曰靈州城下千株柳總被官軍砍作薪他日玉關歸去後將何攀折贈行人青岡峽裏韋州路十去從軍九不回白骨似山山似雪將軍莫上望鄉臺為李密一作察所奏貶彬一作柳州鹽税舜民云官軍圍靈州不下粮盡而返西人城上問官軍漢人兀捺一作摖否答曰兀捺城上皆笑兀捺者慚愧也招髙麗見志林三卷易書論語説孔壁汲冡竹簡科斗皆漆書也終於蠧壊編鍾石鼔益堅古人為不朽之計至矣然其妙意所以不墜者特以人傳之耳易言神而明之存乎其人吾作易書傳論語説亦粗備矣嗚呼又何以多為仇池筆記卷下
